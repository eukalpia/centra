name: Prepare SSH scan performance

on:
  push:
    branches: [fix/ssh-scan-performance]

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/ssh-scan-performance
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Apply SSH snapshot changes
        run: python .github/patch_ssh_snapshot.py
      - name: Apply scan pipeline changes
        run: python .github/patch_ssh_scan_pipeline.py
      - name: Resolve dependencies
        run: dart pub get
      - name: Format changed Dart files
        run: dart format lib/src/core/path_policy.dart lib/src/core/ssh_connection.dart lib/src/core/source.dart lib/src/core/scanner.dart lib/src/tui/ssh_source_picker.dart test/path_policy_test.dart test/ssh_connection_test.dart
      - name: Analyze
        run: dart analyze
      - name: Test
        run: dart test
      - name: Remove preparation files
        run: rm .github/patch_ssh_snapshot.py .github/patch_ssh_scan_pipeline.py .github/workflows/prepare-ssh-scan-performance.yml
      - name: Commit product changes
        run: |
          git config user.name "Centra CI"
          git config user.email "ci@centra.local"
          git add -A
          git commit -m "Speed up SSH scans and report snapshot progress"
          git push origin HEAD:fix/ssh-scan-performance
