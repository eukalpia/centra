name: Prepare SSH interface

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  prepare:
    if: github.head_ref == 'feature/ssh-connection-manager'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/ssh-connection-manager
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Allow non-blocking optional replacements
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('.github/prepare_ssh_ui.py')
          text = path.read_text(encoding='utf-8')
          text = text.replace(
              "        raise SystemExit(f'Pattern not found in {path}: {old[:160]!r}')",
              "        print(f'Optional pattern not found in {path}: {old[:160]!r}')\n        return",
              1,
          )
          path.write_text(text, encoding='utf-8')
          PY
      - name: Apply interface integration
        run: python .github/prepare_ssh_ui.py
      - name: Resolve dependencies
        run: dart pub get
      - name: Format changed interface
        run: dart format lib/src/tui/centra_app.dart lib/src/tui/ssh_source_picker.dart
      - name: Remove preparation files
        run: rm .github/prepare_ssh_ui.py .github/workflows/prepare-ssh-ui.yml .github/ssh-ui.trigger
      - name: Commit prepared interface
        run: |
          git config user.name "Centra CI"
          git config user.email "ci@centra.local"
          git add -A
          git commit -m "Build SSH connection interface" || exit 0
          git push origin HEAD:feature/ssh-connection-manager
