name: Prepare wizard selection scroll

on:
  push:
    branches: [fix/wizard-selection-scroll]

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/wizard-selection-scroll
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Apply wizard scrolling fix
        run: python .github/prepare_wizard_selection_scroll.py
      - name: Resolve dependencies
        run: dart pub get
      - name: Format changed source
        run: dart format lib/src/tui/centra_app.dart
      - name: Analyze
        run: dart analyze
      - name: Test
        run: dart test
      - name: Remove preparation files
        run: rm .github/prepare_wizard_selection_scroll.py .github/workflows/prepare-wizard-selection-scroll.yml
      - name: Commit wizard scrolling fix
        run: |
          git config user.name "Centra CI"
          git config user.email "ci@centra.local"
          git add -A
          git commit -m "Keep wizard selection visible while navigating" || exit 0
          git push origin HEAD:fix/wizard-selection-scroll
