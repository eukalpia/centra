name: Prepare wizard selection scrolling

on:
  pull_request_target:
    types: [reopened, synchronize]

permissions:
  contents: write

jobs:
  prepare:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'fix/wizard-selection-scroll'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Apply wizard scrolling fix
        run: python .github/prepare_wizard_selection_scroll.py
      - name: Resolve dependencies
        run: dart pub get
      - name: Format changed source
        run: dart format lib/src/tui/centra_app.dart
      - name: Analyze
        run: dart analyze
      - name: Test
        run: dart test
      - name: Remove branch preparation files
        run: rm .github/prepare_wizard_selection_scroll.py .github/workflows/prepare-wizard-selection-scroll.yml
      - name: Commit wizard scrolling fix
        run: |
          git config user.name "Centra CI"
          git config user.email "ci@centra.local"
          git add -A
          git commit -m "Keep wizard selection visible while navigating"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
