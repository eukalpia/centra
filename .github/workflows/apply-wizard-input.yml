name: Apply wizard input update

on:
  push:
    branches: [fix/wizard-folder-picker]
    paths:
      - tool/wizard-input-trigger.txt

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/wizard-folder-picker
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Apply integration patch
        run: python3 tool/apply_wizard_input_patch.py
      - name: Remove one-time files
        run: |
          rm tool/apply_wizard_input_patch.py
          rm tool/wizard-input-trigger.txt
          rm .github/workflows/apply-wizard-input.yml
      - name: Format
        run: dart format .
      - name: Resolve dependencies
        run: dart pub get
      - name: Analyze
        run: dart analyze --fatal-warnings
      - name: Test
        run: dart test --reporter expanded
      - name: Compile
        run: |
          mkdir -p build
          dart compile exe bin/centra.dart -o build/centra
      - name: Commit verified update
        run: |
          git config user.name "Centra Maintainer"
          git config user.email "maintainer@centra.local"
          git add -A
          git commit -m "Fix wizard input and add folder picker"
          git push origin HEAD:fix/wizard-folder-picker
