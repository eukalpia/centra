name: Prepare SSH terminal UX

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  prepare:
    if: github.head_ref == 'feature/ssh-terminal-ux'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/ssh-terminal-ux
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Apply SSH terminal UX
        run: python .github/prepare_ssh_terminal_ux.py
      - name: Resolve dependencies
        run: dart pub get
      - name: Format changed Dart files
        run: dart format lib/src/core/ssh_connection.dart lib/src/tui/ssh_source_picker.dart lib/src/tui/ssh_terminal_controller.dart lib/src/tui/wizard_state.dart test/ssh_connection_test.dart
      - name: Remove preparation files
        run: rm .github/prepare_ssh_terminal_ux.py .github/workflows/prepare-ssh-terminal-ux.yml
      - name: Commit prepared SSH terminal UX
        run: |
          git config user.name "Centra CI"
          git config user.email "ci@centra.local"
          git add -A
          git commit -m "Improve SSH navigation and terminal UX" || exit 0
          git push origin HEAD:feature/ssh-terminal-ux
