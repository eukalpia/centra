name: Source Snapshot

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Pack repository
        run: tar --exclude=.git --exclude=.dart_tool --exclude=build -czf /tmp/centra-source.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: centra-source
          path: /tmp/centra-source.tar.gz
          retention-days: 1
