name: Prepare SSH integration

on:
  push:
    branches: [feature/ssh-connection-manager]

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/ssh-connection-manager
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Apply core integration
        run: python .github/prepare_ssh_core.py
      - name: Resolve dependencies
        run: dart pub get
      - name: Format changed Dart files
        run: dart format lib/src/core/profile.dart lib/src/core/source.dart lib/src/core/scanner.dart lib/src/core/ssh_connection.dart lib/src/tui/wizard_state.dart lib/src/tui/ssh_source_picker.dart lib/src/app/cli.dart lib/centra.dart
      - name: Remove preparation files
        run: rm .github/prepare_ssh_core.py .github/workflows/prepare-ssh.yml .github/ssh-prepare.trigger
      - name: Commit prepared integration
        run: |
          git config user.name "Centra CI"
          git config user.email "ci@centra.local"
          git add -A
          git commit -m "Build SSH connection core" || exit 0
          git push origin HEAD:feature/ssh-connection-manager
