name: Format security coverage

on:
  push:
    branches: [quality/security-coverage]

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: quality/security-coverage
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - run: dart pub get
      - run: dart format .
      - name: Commit formatting
        shell: bash
        run: |
          if git diff --quiet; then
            echo "Sources are already formatted."
            exit 0
          fi
          git config user.name "Centra CI"
          git config user.email "centra-ci@users.noreply.github.com"
          git add --all
          git commit -m "Format security coverage tests"
          git push origin HEAD:quality/security-coverage
