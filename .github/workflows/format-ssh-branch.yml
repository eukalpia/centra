name: Format SSH Branch

on:
  push:
    branches:
      - feature/ssh-terminal-ux

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/ssh-terminal-ux
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - run: dart format lib test bin
      - name: Commit formatting
        shell: bash
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib test bin
          git commit -m "style: apply Dart formatting"
          git push origin HEAD:feature/ssh-terminal-ux
