name: Repair and format source

on:
  push:
    branches: [quality/initial-verification]

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: quality/initial-verification
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - run: dart pub get
      - name: Repair source identifiers
        shell: python
        run: |
          from pathlib import Path

          path = Path('lib/src/core/source.dart')
          text = path.read_text(encoding='utf-8')
          replacements = {
              'ProcesResultData': 'ProcessResultData',
              'UInt8List': 'Uint8List',
              'stderrExt': 'stderrText',
          }
          for old, new in replacements.items():
              text = text.replace(old, new)
          path.write_text(text, encoding='utf-8', newline='\n')
      - run: dart format .
      - name: Commit repairs
        shell: bash
        run: |
          if git diff --quiet; then
            echo "Sources are already repaired and formatted."
            exit 0
          fi
          git config user.name "Centra CI"
          git config user.email "centra-ci@users.noreply.github.com"
          git add --all
          git commit -m "Repair and format Dart sources"
          git push origin HEAD:quality/initial-verification
