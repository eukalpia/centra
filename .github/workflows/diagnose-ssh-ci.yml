name: Diagnose SSH CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Resolve dependencies
        shell: bash
        run: dart pub get > resolve.log 2>&1 || true
      - name: Capture formatting result
        shell: bash
        run: dart format --output=none --set-exit-if-changed . > format.log 2>&1 || true
      - name: Capture analyzer result
        shell: bash
        run: dart analyze --fatal-warnings > analyze.log 2>&1 || true
      - name: Capture test result
        shell: bash
        run: dart test --reporter expanded > test.log 2>&1 || true
      - name: Capture install result
        shell: bash
        run: dart install https://github.com/eukalpia/centra.git --git-ref "${{ github.event.pull_request.head.sha }}" --overwrite > install.log 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: ssh-ci-diagnostics
          path: |
            resolve.log
            format.log
            analyze.log
            test.log
            install.log
          retention-days: 1
