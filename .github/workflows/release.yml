name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: centra-linux-x64
            output: build/centra
          - os: macos-latest
            artifact: centra-macos-arm64
            output: build/centra
          - os: windows-latest
            artifact: centra-windows-x64
            output: build/centra.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - run: dart pub get
      - shell: bash
        run: |
          mkdir -p build
          dart compile exe bin/centra.dart -o "${{ matrix.output }}"
      - shell: bash
        run: |
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${{ matrix.output }}" > "${{ matrix.output }}.sha256"
          else
            shasum -a 256 "${{ matrix.output }}" > "${{ matrix.output }}.sha256"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.output }}
            ${{ matrix.output }}.sha256

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/**
          generate_release_notes: true
