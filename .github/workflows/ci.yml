name: CI

on:
  pull_request:

permissions:
  contents: write

jobs:
  format-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - run: dart pub get
      - run: dart format test/docker_browser_test.dart
      - name: Restore strict workflow
        shell: bash
        run: git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
      - name: Commit formatting
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet && exit 0
          git commit -m "Format Docker browser tests"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
