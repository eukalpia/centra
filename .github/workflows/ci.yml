name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

jobs:
  prepare-ssh-scan:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.ref == 'fix/ssh-scan-performance'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/ssh-scan-performance
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Apply product changes
        run: |
          python .github/patch_ssh_snapshot.py
          python .github/patch_ssh_scan_pipeline.py
      - run: dart pub get
      - name: Format changed Dart files
        run: dart format lib/src/core/path_policy.dart lib/src/core/ssh_connection.dart lib/src/core/source.dart lib/src/core/scanner.dart lib/src/tui/ssh_source_picker.dart test/path_policy_test.dart test/ssh_connection_test.dart
      - name: Analyze
        shell: bash
        run: |
          set -o pipefail
          dart analyze --fatal-warnings 2>&1 | tee ssh-analyze.log
      - name: Publish analyzer diagnostics
        if: failure()
        run: |
          git config user.name "Centra CI"
          git config user.email "ci@centra.local"
          git add ssh-analyze.log
          git commit -m "Record SSH scan analyzer diagnostics"
          git push origin HEAD:fix/ssh-scan-performance
      - name: Test
        run: dart test
      - name: Restore clean project workflow
        run: |
          rm .github/patch_ssh_snapshot.py
          rm .github/patch_ssh_scan_pipeline.py
          rm .github/workflows/prepare-ssh-scan-performance.yml
          rm .github/trigger-ssh-scan-performance
          git fetch origin main
          git checkout origin/main -- .github/workflows/ci.yml
      - name: Commit product changes
        run: |
          git config user.name "Centra CI"
          git config user.email "ci@centra.local"
          git add -A
          git commit -m "Speed up SSH scans and report snapshot progress"
          git push origin HEAD:fix/ssh-scan-performance

  quality:
    name: Quality · ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - run: dart pub get
      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .
      - name: Analyze
        run: dart analyze --fatal-warnings
      - name: Test
        shell: bash
        run: |
          set -o pipefail
          dart test --reporter expanded 2>&1 | tee test.log
      - name: Upload failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: centra-test-log-${{ runner.os }}
          path: test.log
          if-no-files-found: warn
      - name: Compile executable
        shell: bash
        run: |
          mkdir -p build
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            dart compile exe bin/centra.dart -o build/centra.exe
          else
            dart compile exe bin/centra.dart -o build/centra
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: centra-${{ runner.os }}-${{ runner.arch }}
          path: build/centra*
          if-no-files-found: error

  install:
    name: Install command · ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      INSTALL_REF: ${{ github.event.pull_request.head.sha || github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Configure isolated Dart Data Home
        shell: bash
        run: echo "DART_DATA_HOME=$RUNNER_TEMP/dart-data" >> "$GITHUB_ENV"
      - name: Install from Git repository
        shell: bash
        run: dart install https://github.com/eukalpia/centra.git --git-ref "$INSTALL_REF" --overwrite
      - name: Run installed command on Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -o pipefail
          export PATH="$PATH:$DART_DATA_HOME/install/bin"
          centra --version | tee installed-version.txt
          grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([+-][0-9A-Za-z.-]+)?$' installed-version.txt
      - name: Run installed command on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:Path = "$env:Path;$env:DART_DATA_HOME\install\bin"
          $version = (centra --version).Trim()
          Write-Output $version
          if ($version -notmatch '^\d+\.\d+\.\d+([+-][0-9A-Za-z.-]+)?$') {
            throw "Unexpected Centra version: $version"
          }
