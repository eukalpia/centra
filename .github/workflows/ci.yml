name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

jobs:
  prepare-interface:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.ref == 'feature/production-scan-workflow'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/production-scan-workflow
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Integrate application shell
        run: |
          python .github/integrate_production_shell.py
          python .github/integrate_wizard_saved_ssh.py
          python .github/fix_existing_profiles_onboarding.py
          python .github/integrate_settings_messages.py
      - name: Add public profile editor export
        shell: bash
        run: |
          line="export 'src/core/profile_editor.dart';"
          grep -Fqx "$line" lib/centra.dart || echo "$line" >> lib/centra.dart
      - run: dart pub get
      - run: dart format lib test
      - name: Restore project workflow
        run: |
          rm .github/integrate_production_shell.py
          rm .github/integrate_wizard_saved_ssh.py
          rm .github/fix_existing_profiles_onboarding.py
          rm .github/integrate_settings_messages.py
          git fetch origin main
          git checkout origin/main -- .github/workflows/ci.yml
      - name: Commit integrated interface
        run: |
          git config user.name "Centra CI"
          git config user.email "ci@centra.local"
          git add -A
          git commit -m "Integrate production scan workflow and SSH library"
          git push origin HEAD:feature/production-scan-workflow

  quality:
    name: Quality · ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - run: dart pub get
      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .
      - name: Analyze
        shell: bash
        run: |
          set -o pipefail
          dart analyze --fatal-warnings 2>&1 | tee analyzer.log
      - name: Upload analyzer diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: centra-analyzer-${{ runner.os }}
          path: analyzer.log
          if-no-files-found: error
      - name: Test
        shell: bash
        run: |
          set -o pipefail
          dart test --reporter expanded 2>&1 | tee test.log
      - name: Upload failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: centra-test-log-${{ runner.os }}
          path: test.log
          if-no-files-found: warn
      - name: Compile executable
        shell: bash
        run: |
          mkdir -p build
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            dart compile exe bin/centra.dart -o build/centra.exe
          else
            dart compile exe bin/centra.dart -o build/centra
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: centra-${{ runner.os }}-${{ runner.arch }}
          path: build/centra*
          if-no-files-found: error

  install:
    name: Install command · ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      INSTALL_REF: ${{ github.event.pull_request.head.sha || github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Configure isolated Dart Data Home
        shell: bash
        run: echo "DART_DATA_HOME=$RUNNER_TEMP/dart-data" >> "$GITHUB_ENV"
      - name: Install from Git repository
        shell: bash
        run: dart install https://github.com/eukalpia/centra.git --git-ref "$INSTALL_REF" --overwrite
      - name: Run installed command on Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          export PATH="$PATH:$DART_DATA_HOME/install/bin"
          centra --version
      - name: Run installed command on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:Path = "$env:Path;$env:DART_DATA_HOME\install\bin"
          centra --version
