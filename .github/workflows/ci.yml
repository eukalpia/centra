name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

jobs:
  prepare-production-scan:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.ref == 'feature/production-scan-workflow'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/production-scan-workflow
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Assemble staged Dart modules
        shell: bash
        run: |
          cat .github/parts/local_scan_engine.1 \
              .github/parts/local_scan_engine.2a \
              .github/parts/local_scan_engine.2b1 \
              .github/parts/local_scan_engine.2b2 \
              > lib/src/core/local_scan_engine.dart
          cat .github/parts/ssh_scan_engine.1 \
              .github/parts/ssh_scan_engine.2 \
              > lib/src/core/ssh_scan_engine.dart
          cat .github/parts/scanner.1 \
              .github/parts/scanner.2 \
              .github/parts/scanner.3 \
              > lib/src/core/scanner.dart
          cat .github/parts/ssh_connection_library.1 \
              .github/parts/ssh_connection_library.2 \
              > lib/src/tui/ssh_connection_library.dart
      - name: Apply schema and runtime migrations
        run: |
          python .github/apply_production_scan_models.py
          python .github/apply_manifest_scan_summary.py
          python .github/apply_ssh_direct_streaming.py
          python .github/apply_cancellable_sources.py
          python .github/apply_ssh_connection_cancellation.py
          python .github/apply_legacy_snapshot_cancellation.py
      - name: Add public exports
        shell: bash
        run: |
          for line in \
            "export 'src/core/scan_result.dart';" \
            "export 'src/core/trusted_baseline.dart';" \
            "export 'src/core/ssh_library.dart';"; do
            grep -Fqx "$line" lib/centra.dart || echo "$line" >> lib/centra.dart
          done
      - run: dart pub get
      - name: Format product code
        shell: bash
        run: |
          dart format lib test || true
      - name: Remove staging files and restore CI
        shell: bash
        run: |
          rm -rf .github/parts
          rm .github/apply_production_scan_models.py
          rm .github/apply_manifest_scan_summary.py
          rm .github/apply_ssh_direct_streaming.py
          rm .github/apply_cancellable_sources.py
          rm .github/apply_ssh_connection_cancellation.py
          rm .github/apply_legacy_snapshot_cancellation.py
          git fetch origin main
          git checkout origin/main -- .github/workflows/ci.yml
      - name: Commit assembled product tree
        shell: bash
        run: |
          git config user.name "Centra CI"
          git config user.email "ci@centra.local"
          git add -A
          git commit -m "Build production scan workflow"
          git push origin HEAD:feature/production-scan-workflow

  quality:
    name: Quality · ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - run: dart pub get
      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .
      - name: Analyze
        run: dart analyze --fatal-warnings
      - name: Test
        shell: bash
        run: |
          set -o pipefail
          dart test --reporter expanded 2>&1 | tee test.log
      - name: Upload failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: centra-test-log-${{ runner.os }}
          path: test.log
          if-no-files-found: warn
      - name: Compile executable
        shell: bash
        run: |
          mkdir -p build
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            dart compile exe bin/centra.dart -o build/centra.exe
          else
            dart compile exe bin/centra.dart -o build/centra
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: centra-${{ runner.os }}-${{ runner.arch }}
          path: build/centra*
          if-no-files-found: error

  install:
    name: Install command · ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      INSTALL_REF: ${{ github.event.pull_request.head.sha || github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Configure isolated Dart Data Home
        shell: bash
        run: echo "DART_DATA_HOME=$RUNNER_TEMP/dart-data" >> "$GITHUB_ENV"
      - name: Install from Git repository
        shell: bash
        run: dart install https://github.com/eukalpia/centra.git --git-ref "$INSTALL_REF" --overwrite
      - name: Run installed command on Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          export PATH="$PATH:$DART_DATA_HOME/install/bin"
          centra --version
      - name: Run installed command on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:Path = "$env:Path;$env:DART_DATA_HOME\install\bin"
          centra --version
