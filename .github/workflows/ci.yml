name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

jobs:
  prepare-update:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Apply wizard integration
        run: python3 tool/apply_wizard_input_patch.py
      - name: Remove one-time integration files
        run: |
          rm tool/apply_wizard_input_patch.py
          rm tool/wizard-input-trigger.txt
          rm .github/workflows/apply-wizard-input.yml
          git fetch origin main
          git checkout origin/main -- .github/workflows/ci.yml
      - name: Format
        run: dart format .
      - name: Resolve dependencies
        run: dart pub get
      - name: Analyze
        run: dart analyze --fatal-warnings
      - name: Test
        run: dart test --reporter expanded
      - name: Compile
        run: |
          mkdir -p build
          dart compile exe bin/centra.dart -o build/centra
      - name: Commit verified update
        run: |
          git config user.name "Centra Maintainer"
          git config user.email "maintainer@centra.local"
          git add -A
          git commit -m "Fix wizard input and add folder picker"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

  quality:
    name: Quality · ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - run: dart pub get
      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .
      - name: Analyze
        run: dart analyze --fatal-warnings
      - name: Test
        shell: bash
        run: |
          set -o pipefail
          dart test --reporter expanded 2>&1 | tee test.log
      - name: Upload failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: centra-test-log-${{ runner.os }}
          path: test.log
          if-no-files-found: warn
      - name: Compile executable
        shell: bash
        run: |
          mkdir -p build
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            dart compile exe bin/centra.dart -o build/centra.exe
          else
            dart compile exe bin/centra.dart -o build/centra
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: centra-${{ runner.os }}-${{ runner.arch }}
          path: build/centra*
          if-no-files-found: error

  install:
    name: Install command · ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      INSTALL_REF: ${{ github.event.pull_request.head.sha || github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Configure isolated Dart Data Home
        shell: bash
        run: echo "DART_DATA_HOME=$RUNNER_TEMP/dart-data" >> "$GITHUB_ENV"
      - name: Install from Git repository
        shell: bash
        run: dart install https://github.com/eukalpia/centra.git --git-ref "$INSTALL_REF" --overwrite
      - name: Run installed command on Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -o pipefail
          export PATH="$PATH:$DART_DATA_HOME/install/bin"
          centra --version | tee installed-version.txt
          grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([+-][0-9A-Za-z.-]+)?$' installed-version.txt
      - name: Run installed command on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:Path = "$env:Path;$env:DART_DATA_HOME\install\bin"
          $version = (centra --version).Trim()
          Write-Output $version
          if ($version -notmatch '^\d+\.\d+\.\d+([+-][0-9A-Za-z.-]+)?$') {
            throw "Unexpected Centra version: $version"
          }
