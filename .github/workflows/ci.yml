name: CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  analyze-diagnostics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - run: dart pub get
      - name: Analyze
        shell: bash
        run: |
          set +e
          dart analyze --fatal-warnings 2>&1 | tee analyze.log
          status=${PIPESTATUS[0]}
          echo "ANALYZE_STATUS=$status" >> "$GITHUB_ENV"
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: docker-browser-analyzer
          path: analyze.log
          if-no-files-found: error
      - name: Preserve analyzer result
        shell: bash
        run: exit "$ANALYZE_STATUS"
