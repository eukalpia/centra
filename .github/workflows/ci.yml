name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    name: Quality · ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - run: dart pub get
      - name: Format sources
        id: format
        continue-on-error: true
        shell: bash
        run: |
          dart format . 2>&1 | tee format.log
          exit ${PIPESTATUS[0]}
      - name: Upload diagnostics
        if: runner.os == 'Linux' && always()
        uses: actions/upload-artifact@v4
        with:
          name: centra-diagnostics
          path: |
            bin
            lib
            test
            format.log
          if-no-files-found: error
      - name: Analyze
        id: analyze
        continue-on-error: true
        shell: bash
        run: dart analyze --fatal-infos 2>&1 | tee analyze.log
      - name: Test
        id: test
        continue-on-error: true
        shell: bash
        run: dart test 2>&1 | tee test.log
      - name: Compile executable
        id: compile
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p build
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            dart compile exe bin/centra.dart -o build/centra.exe 2>&1 | tee compile.log
          else
            dart compile exe bin/centra.dart -o build/centra 2>&1 | tee compile.log
          fi
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: centra-logs-${{ runner.os }}
          path: |
            format.log
            analyze.log
            test.log
            compile.log
          if-no-files-found: warn
      - name: Diagnostic summary
        if: always()
        shell: bash
        run: |
          echo "format=${{ steps.format.outcome }}"
          echo "analyze=${{ steps.analyze.outcome }}"
          echo "test=${{ steps.test.outcome }}"
          echo "compile=${{ steps.compile.outcome }}"
